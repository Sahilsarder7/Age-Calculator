<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Age Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8c97e;
      --accent2: #c9724e;
      --text: #f0ede6;
      --muted: #777;
      --input-bg: #111;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,201,126,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,201,126,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.1s;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.2s;
    }

    h1 span {
      color: var(--accent);
      display: block;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.3s;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.4s;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 4px 4px 0 0;
    }

    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.75rem 0.9rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -moz-appearance: textfield;
    }

    .field input::-webkit-inner-spin-button,
    .field input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,126,0.1);
    }

    .field input.error {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(201,114,78,0.1);
    }

    .error-msg {
      font-size: 0.65rem;
      color: var(--accent2);
      margin-top: 0.35rem;
      min-height: 1em;
      letter-spacing: 0.03em;
    }

    button {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: 3px;
      padding: 0.9rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #f0d890; }
    button:active { transform: scale(0.99); }

    /* Result */
    .result {
      margin-top: 1.5rem;
      display: none;
      animation: fadeUp 0.4s ease forwards;
    }

    .result.show { display: block; }

    .result-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .result-main {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .result-block {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1rem 0.75rem;
      text-align: center;
    }

    .result-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      display: block;
    }

    .result-unit {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
      display: block;
    }

    .result-extras {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .extra-item {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .extra-key {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .extra-val {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
    }

    .next-birthday {
      margin-top: 0.75rem;
      background: rgba(232,201,126,0.06);
      border: 1px solid rgba(232,201,126,0.2);
      border-radius: 3px;
      padding: 0.75rem 1rem;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* Footer */
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.5s;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .result-main { flex-direction: column; }
      .result-extras { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <span class="badge">Utility Tool</span>
    <h1>Age <span>Calculator</span></h1>
    <p class="subtitle">Enter your date of birth to compute your exact age</p>
  </div>

  <div class="card">
    <div class="field-group">
      <div class="field">
        <label>Day</label>
        <input type="number" id="day" placeholder="DD" min="1" max="31"/>
        <div class="error-msg" id="day-err"></div>
      </div>
      <div class="field">
        <label>Month</label>
        <input type="number" id="month" placeholder="MM" min="1" max="12"/>
        <div class="error-msg" id="month-err"></div>
      </div>
      <div class="field">
        <label>Year</label>
        <input type="number" id="year" placeholder="YYYY" min="1900" max="2026"/>
        <div class="error-msg" id="year-err"></div>
      </div>
    </div>

    <button onclick="calculate()">Calculate Age</button>

    <div class="result" id="result">
      <hr class="result-divider"/>
      <div class="result-label">Your age is</div>
      <div class="result-main">
        <div class="result-block">
          <span class="result-num" id="res-years">—</span>
          <span class="result-unit">Years</span>
        </div>
        <div class="result-block">
          <span class="result-num" id="res-months">—</span>
          <span class="result-unit">Months</span>
        </div>
        <div class="result-block">
          <span class="result-num" id="res-days">—</span>
          <span class="result-unit">Days</span>
        </div>
      </div>
      <div class="result-extras">
        <div class="extra-item">
          <span class="extra-key">Total Days</span>
          <span class="extra-val" id="total-days">—</span>
        </div>
        <div class="extra-item">
          <span class="extra-key">Total Weeks</span>
          <span class="extra-val" id="total-weeks">—</span>
        </div>
        <div class="extra-item">
          <span class="extra-key">Total Hours</span>
          <span class="extra-val" id="total-hours">—</span>
        </div>
        <div class="extra-item">
          <span class="extra-key">Day of Birth</span>
          <span class="extra-val" id="birth-day">—</span>
        </div>
      </div>
      <div class="next-birthday" id="next-bday"></div>
    </div>
  </div>

  <div class="footer">
    View source on <a href="https://github.com/" target="_blank">GitHub</a> &nbsp;·&nbsp; Built with HTML / CSS / JS
  </div>
</div>

<script>
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function clearErrors() {
    ['day','month','year'].forEach(id => {
      document.getElementById(id).classList.remove('error');
      document.getElementById(id + '-err').textContent = '';
    });
  }

  function setError(id, msg) {
    document.getElementById(id).classList.add('error');
    document.getElementById(id + '-err').textContent = msg;
  }

  function daysInMonth(m, y) {
    return new Date(y, m, 0).getDate();
  }

  function calculate() {
    clearErrors();
    const dayVal   = parseInt(document.getElementById('day').value);
    const monthVal = parseInt(document.getElementById('month').value);
    const yearVal  = parseInt(document.getElementById('year').value);

    let valid = true;
    const today = new Date();
    today.setHours(0,0,0,0);

    if (!dayVal || dayVal < 1 || dayVal > 31) {
      setError('day', 'Enter 1–31'); valid = false;
    }
    if (!monthVal || monthVal < 1 || monthVal > 12) {
      setError('month', 'Enter 1–12'); valid = false;
    }
    if (!yearVal || yearVal < 1900 || yearVal > today.getFullYear()) {
      setError('year', `Enter 1900–${today.getFullYear()}`); valid = false;
    }

    if (valid && dayVal > daysInMonth(monthVal, yearVal)) {
      setError('day', 'Invalid date'); valid = false;
    }

    if (valid) {
      const dob = new Date(yearVal, monthVal - 1, dayVal);
      if (dob > today) { setError('year', 'Date in future'); valid = false; }

      if (valid) {
        // Years, months, days
        let y = today.getFullYear() - dob.getFullYear();
        let m = today.getMonth()    - dob.getMonth();
        let d = today.getDate()     - dob.getDate();

        if (d < 0) {
          m--;
          d += daysInMonth(today.getMonth(), today.getFullYear()) || 30;
        }
        if (m < 0) { m += 12; y--; }

        // Totals
        const msPerDay = 86400000;
        const totalDays  = Math.floor((today - dob) / msPerDay);
        const totalWeeks = Math.floor(totalDays / 7);
        const totalHours = totalDays * 24;

        // Next birthday
        let nextBday = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
        if (nextBday <= today) nextBday.setFullYear(today.getFullYear() + 1);
        const daysUntil = Math.ceil((nextBday - today) / msPerDay);

        // Birth day name
        const birthDayName = days[dob.getDay()];

        // Display
        document.getElementById('res-years').textContent  = y;
        document.getElementById('res-months').textContent = m;
        document.getElementById('res-days').textContent   = d;
        document.getElementById('total-days').textContent  = totalDays.toLocaleString();
        document.getElementById('total-weeks').textContent = totalWeeks.toLocaleString();
        document.getElementById('total-hours').textContent = totalHours.toLocaleString();
        document.getElementById('birth-day').textContent   = birthDayName;
        document.getElementById('next-bday').textContent   =
          daysUntil === 0
            ? '🎂 Happy Birthday!'
            : `🎂 Next birthday in ${daysUntil} day${daysUntil !== 1 ? 's' : ''}`;

        const r = document.getElementById('result');
        r.classList.remove('show');
        void r.offsetWidth; // reflow to re-trigger animation
        r.classList.add('show');
      }
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>

</body>
</html>
